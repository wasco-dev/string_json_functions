on:
  workflow_dispatch:
  push:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: wasco-dev/workflows/.github/actions/install-wkg@main

      - name: Set up rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-wasip2
          cache-directories: "target"
          cache-all-crates: "true"

      - name: Fetch WIT dependencies
        run: |
          WKG_CONFIG_FILE="/dev/stdin" wkg wit fetch <<'EOF'
          namespace_registries.wasco-dev = "wasco.dev"
          namespace_registries.wasi = "wasi.dev"
          EOF

      - name: Build project
        run: cargo build --release --target wasm32-wasip2

      - name: Upload wasm artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-component
          path: target/wasm32-wasip2/release/*.wasm

  publish-azure:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: wasco-dev/workflows/.github/actions/install-wkg@main

      - name: Download wasm artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-component
          path: target

      - name: Log in to Azure registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DEV_AZURE_REGISTRY }}
          username: ${{ secrets.DEV_AZURE_USERNAME }}
          password: ${{ secrets.DEV_AZURE_PASSWORD }}

      - name: Push to Azure registry
        run: |
          package_registry_path="${{ secrets.DEV_AZURE_REGISTRY }}/$(sed -nE 's/package wasco-dev:([a-z0-9-]+)@([0-9]\.[0-9]\.[0-9]);/wasco-dev\/\1:\2/p' wit/world.wit)"
          wkg oci push "$package_registry_path" target/*.wasm

  publish-azure-prod:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: wasco-dev/workflows/.github/actions/install-wkg@main

      - name: Download wasm artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-component
          path: target

      - name: Log in to Azure registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.PROD_AZURE_REGISTRY }}
          username: ${{ secrets.PROD_AZURE_USERNAME }}
          password: ${{ secrets.PROD_AZURE_PASSWORD }}

      - name: Push to Azure registry
        run: |
          package_registry_path="${{ secrets.PROD_AZURE_REGISTRY }}/$(sed -nE 's/package wasco-dev:([a-z0-9-]+)@([0-9]\.[0-9]\.[0-9]);/wasco-dev\/\1:\2/p' wit/world.wit)"
          wkg oci push "$package_registry_path" target/*.wasm
